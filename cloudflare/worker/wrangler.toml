name = "ilovepdf-queue"
main = "src/index.js"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── KV: job status store ─────────────────────────────────────────────────────
# Create with:  npx wrangler kv namespace create PDF_JOBS_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "PDF_JOBS_KV"
id      = "REPLACE_WITH_KV_NAMESPACE_ID"

# ─── R2: file + result storage (re-uses your existing bucket) ─────────────────
[[r2_buckets]]
binding     = "PDF_BUCKET"
bucket_name = "ilovepdf"

# ─── Queue: producer binding (Worker → Queue) ─────────────────────────────────
# Create with:  npx wrangler queues create pdf-jobs
[[queues.producers]]
queue   = "pdf-jobs"
binding = "PDF_QUEUE"

# ─── Queue: consumer (Queue → Worker) ─────────────────────────────────────────
# Same Worker handles both produce and consume. Tune batching for throughput.
[[queues.consumers]]
queue                 = "pdf-jobs"
max_batch_size        = 5
max_batch_timeout     = 5
max_concurrency       = 10
max_retries           = 2
dead_letter_queue     = "pdf-jobs-dlq"

# ─── Public env (non-secret) ──────────────────────────────────────────────────
[vars]
HF_SPACE_URL          = "https://ilovepdf-ilovepdf.hf.space"
RESULT_TTL_SECONDS    = "86400"          # 24 h pre-signed result URLs / KV TTL
SKIP_QUEUE_BYTES      = "2097152"        # < 2 MB → producer hints client to use direct route
ALLOWED_ORIGINS       = "*"              # comma-separated, or * for any
FIREBASE_PROJECT_ID   = "ilovepdf-web"

# Secrets (set with `npx wrangler secret put <NAME>`):
#   HF_API_TOKEN
#   R2_PUBLIC_BASE_URL  (optional — if you've fronted the bucket with a public domain)
