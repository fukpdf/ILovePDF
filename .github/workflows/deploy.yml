name: Deploy Project

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Firebase Hosting — direct static deploy from /public ────────────────
      # @master bypasses framework auto-detection so the action never tries
      # to install or build the project (avoids exit code 2 on Actions).
      - name: Deploy Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project ilovepdf-web
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── Cloudflare Worker (queue producer + consumer) ───────────────────────
      # Secrets are pushed to the worker at deploy time via the action's
      # `secrets:` input. Anything listed there is read from `env:` below
      # and stored as a Worker secret automatically — no manual `wrangler
      # secret put` step needed.
      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/worker
          command: deploy
          secrets: |
            HF_API_TOKEN
        env:
          HF_API_TOKEN: ${{ secrets.HF_TOKEN }}

      # ── Hugging Face Space ──────────────────────────────────────────────────
      # The HF Space is the runtime that actually performs the heavy
      # processing (called by the Worker via HF_SPACE_URL). It is
      # deployed/maintained out-of-band from this repo and authenticated
      # via the HF_TOKEN secret used above. No build step needed here —
      # this comment exists so the HF leg of the stack is documented in
      # the workflow file alongside the others.
