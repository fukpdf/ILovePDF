<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — ILovePDF</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ILovePDF">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--indigo:#4f46e5;--indigo-dk:#3730a3;--gray:#6b7280;--bg:#f9fafb}
    body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:#111827;display:flex;flex-direction:column;
      min-height:100dvh;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .icon{width:96px;height:96px;background:#ede9fe;border-radius:50%;display:flex;
      align-items:center;justify-content:center;margin:0 auto 2rem}
    .icon svg{width:48px;height:48px;stroke:#4f46e5;stroke-width:1.5;fill:none;
      stroke-linecap:round;stroke-linejoin:round}
    h1{font-size:clamp(1.5rem,4vw,2.25rem);font-weight:700;margin-bottom:.75rem;letter-spacing:-.02em}
    p{color:var(--gray);font-size:1.0625rem;max-width:420px;line-height:1.65;margin:0 auto 2rem}
    .actions{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;
      border-radius:.625rem;font-size:.9375rem;font-weight:600;cursor:pointer;
      border:none;text-decoration:none;transition:background .15s,transform .1s}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--indigo);color:#fff}
    .btn-primary:hover{background:var(--indigo-dk)}
    .btn-secondary{background:#fff;color:#374151;border:1.5px solid #d1d5db}
    .btn-secondary:hover{background:#f3f4f6}
    .status{margin-top:2.5rem;font-size:.8125rem;color:#9ca3af;display:flex;align-items:center;gap:.5rem;justify-content:center}
    .dot{width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0}
    .dot.online{background:#10b981}
    footer{margin-top:auto;padding-top:2rem;font-size:.8125rem;color:#9ca3af}
    footer a{color:var(--indigo);text-decoration:none}
    /* RTL support */
    [dir="rtl"] .actions{flex-direction:row-reverse}
    [dir="rtl"] .btn{flex-direction:row-reverse}
    [dir="rtl"] .status{flex-direction:row-reverse}
    @media(prefers-color-scheme:dark){
      body{background:#0f172a;color:#f1f5f9}
      .icon{background:#1e1b4b}
      p{color:#94a3b8}
      .btn-secondary{background:#1e293b;color:#e2e8f0;border-color:#334155}
      .btn-secondary:hover{background:#334155}
      .status{color:#64748b}
      footer{color:#475569}
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 3l18 18M10.584 10.587A2 2 0 0 0 12 15a2 2 0 0 0 2-2c0-.547-.22-1.04-.577-1.4M9 9a3 3 0 0 0 4.243 4.243M7.05 7.05A7 7 0 0 0 19 12M5 5a7.001 7.001 0 0 0 9.95 9.95M3 3l.5.5"/>
      <line x1="22" y1="12" x2="18" y2="12"/>
      <line x1="12" y1="2" x2="12" y2="6"/>
    </svg>
  </div>

  <h1 id="offline-title">You're Offline</h1>
  <p id="offline-desc">It looks like you've lost your internet connection. Check your network and try again — ILovePDF will be ready when you're back.</p>

  <div class="actions">
    <button class="btn btn-primary" id="btn-retry" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      <span id="retry-label">Try Again</span>
    </button>
    <a href="/" class="btn btn-secondary" id="btn-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span id="home-label">Home</span>
    </a>
  </div>

  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">No internet connection</span>
  </div>

  <footer>
    <a href="/">ILovePDF</a> &mdash; Free PDF &amp; Image Tools
  </footer>

  <script>
    /* Inline multilingual strings for offline page (no network available).
       Covers RTL languages + high-traffic locales. Falls back to English. */
    var STRINGS = {
      ar:{ title:'أنت غير متصل',desc:'يبدو أنك فقدت اتصالك بالإنترنت. تحقق من شبكتك وحاول مجدداً.',retry:'إعادة المحاولة',home:'الرئيسية',status_off:'لا يوجد اتصال',status_on:'تم استعادة الاتصال — اضغط إعادة المحاولة',dir:'rtl' },
      ur:{ title:'آپ آف لائن ہیں',desc:'آپ کا انٹرنیٹ کنکشن منقطع ہو گیا ہے۔ نیٹ ورک چیک کریں اور دوبارہ کوشش کریں۔',retry:'دوبارہ کوشش کریں',home:'ہوم',status_off:'انٹرنیٹ کنکشن نہیں',status_on:'کنکشن بحال ہوا',dir:'rtl' },
      fa:{ title:'شما آفلاین هستید',desc:'به نظر می‌رسد اتصال اینترنت شما قطع شده است. شبکه را بررسی کنید.',retry:'تلاش مجدد',home:'خانه',status_off:'اینترنت در دسترس نیست',status_on:'اتصال برقرار شد',dir:'rtl' },
      hi:{ title:'आप ऑफ़लाइन हैं',desc:'आपका इंटरनेट कनेक्शन खो गया है। नेटवर्क जांचें और पुनः प्रयास करें।',retry:'पुनः प्रयास करें',home:'होम',status_off:'इंटरनेट कनेक्शन नहीं',status_on:'कनेक्शन वापस आया',dir:'ltr' },
      zh:{ title:'您已离线',desc:'您的网络连接已断开，请检查网络后重试。',retry:'重试',home:'主页',status_off:'无网络连接',status_on:'网络已恢复',dir:'ltr' },
      fr:{ title:'Vous êtes hors ligne',desc:'Il semble que vous ayez perdu votre connexion internet. Vérifiez votre réseau et réessayez.',retry:'Réessayer',home:'Accueil',status_off:'Pas de connexion',status_on:'Connexion rétablie',dir:'ltr' },
      de:{ title:'Sie sind offline',desc:'Ihre Internetverbindung wurde unterbrochen. Bitte überprüfen Sie Ihr Netzwerk.',retry:'Erneut versuchen',home:'Startseite',status_off:'Keine Verbindung',status_on:'Verbindung wiederhergestellt',dir:'ltr' },
      es:{ title:'Estás sin conexión',desc:'Parece que has perdido tu conexión a internet. Comprueba tu red e inténtalo de nuevo.',retry:'Reintentar',home:'Inicio',status_off:'Sin conexión',status_on:'Conexión restaurada',dir:'ltr' },
      pt:{ title:'Você está offline',desc:'Parece que você perdeu a conexão com a internet. Verifique sua rede e tente novamente.',retry:'Tentar novamente',home:'Início',status_off:'Sem conexão',status_on:'Conexão restaurada',dir:'ltr' },
      ru:{ title:'Вы не в сети',desc:'Похоже, вы потеряли интернет-соединение. Проверьте сеть и попробуйте снова.',retry:'Повторить',home:'Главная',status_off:'Нет соединения',status_on:'Соединение восстановлено',dir:'ltr' },
      tr:{ title:'Çevrimdışısınız',desc:'İnternet bağlantınız kesilmiş gibi görünüyor. Ağınızı kontrol edin ve tekrar deneyin.',retry:'Tekrar dene',home:'Ana sayfa',status_off:'Bağlantı yok',status_on:'Bağlantı sağlandı',dir:'ltr' },
      id:{ title:'Anda sedang offline',desc:'Sepertinya Anda kehilangan koneksi internet. Periksa jaringan dan coba lagi.',retry:'Coba lagi',home:'Beranda',status_off:'Tidak ada koneksi',status_on:'Koneksi pulih',dir:'ltr' },
    };

    function detectLang() {
      try {
        var stored = localStorage.getItem('ilovepdf_lang');
        if (stored) return stored;
      } catch (_) {}
      var langs = navigator.languages || [navigator.language || 'en'];
      for (var i = 0; i < langs.length; i++) {
        var code = langs[i].toLowerCase().split('-')[0];
        if (STRINGS[code]) return code;
      }
      return 'en';
    }

    function applyLang() {
      var lang = detectLang();
      var s = STRINGS[lang];
      if (!s) return;
      if (s.dir === 'rtl') {
        document.documentElement.setAttribute('dir', 'rtl');
        document.documentElement.setAttribute('lang', lang);
      } else {
        document.documentElement.setAttribute('lang', lang);
      }
      var t = document.getElementById('offline-title');
      var d = document.getElementById('offline-desc');
      var rl = document.getElementById('retry-label');
      var hl = document.getElementById('home-label');
      if (t) t.textContent = s.title;
      if (d) d.textContent = s.desc;
      if (rl) rl.textContent = s.retry;
      if (hl) hl.textContent = s.home;
      document.title = s.title + ' \u2014 ILovePDF';
      window._offlineStrings = s;
    }

    function updateStatus() {
      var online = navigator.onLine;
      var s = window._offlineStrings || {};
      document.getElementById('dot').className = 'dot' + (online ? ' online' : '');
      document.getElementById('status-text').textContent = online
        ? (s.status_on || 'Connection restored \u2014 click Try Again')
        : (s.status_off || 'No internet connection');
      if (online) {
        setTimeout(function () { window.location.reload(); }, 800);
      }
    }

    applyLang();
    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
