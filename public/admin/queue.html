<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Queue Dashboard — ILovePDF Admin</title>
<link rel="icon" href="/favicon.ico" />
<style>
  :root {
    --red:#E5322E; --red-dark:#b91c1c;
    --bg:#f7f8fa; --card:#ffffff; --line:#e5e7eb;
    --text:#0f172a; --muted:#64748b; --soft:#f1f5f9;
    --ok:#10b981; --warn:#f59e0b; --err:#ef4444; --info:#3b82f6;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--text);
    font:14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height:100vh;
  }
  a { color:var(--red); text-decoration:none; }

  /* ── Header ───────────────────────────────────────────── */
  header {
    background:#fff; border-bottom:1px solid var(--line);
    padding:14px 18px; display:flex; align-items:center; gap:14px;
    position:sticky; top:0; z-index:5;
  }
  .brand { display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; }
  .brand-dot { width:24px; height:24px; border-radius:6px; background:var(--red); display:inline-flex; align-items:center; justify-content:center; color:#fff; font-weight:800; }
  .header-spacer { flex:1; }
  .header-meta { color:var(--muted); font-size:12px; display:flex; align-items:center; gap:14px; }
  .pulse { width:8px; height:8px; border-radius:50%; background:var(--ok); display:inline-block; box-shadow:0 0 0 0 rgba(16,185,129,.6); animation:pulse 2s infinite; }
  @keyframes pulse { 0% { box-shadow:0 0 0 0 rgba(16,185,129,.55); } 70% { box-shadow:0 0 0 8px rgba(16,185,129,0); } 100% { box-shadow:0 0 0 0 rgba(16,185,129,0); } }
  .logout-btn {
    background:transparent; color:var(--muted); border:1px solid var(--line);
    padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;
  }
  .logout-btn:hover { color:var(--red); border-color:var(--red); }

  main { max-width:1200px; margin:0 auto; padding:22px 18px 40px; }

  /* ── Login screen ─────────────────────────────────────── */
  .login-shell {
    min-height: calc(100vh - 60px);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .login-card {
    width:100%; max-width:380px;
    background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:28px 26px;
    box-shadow:0 6px 24px rgba(15,23,42,.06);
  }
  .login-title { font-size:20px; font-weight:700; margin:4px 0 4px; }
  .login-sub { color:var(--muted); font-size:13px; margin:0 0 20px; }
  .field { display:block; margin-bottom:14px; }
  .field label { display:block; font-weight:600; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .field input {
    width:100%; padding:10px 12px; font-size:14px;
    border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(229,50,46,.15); }
  .btn-primary {
    width:100%; padding:11px 14px; font-size:14px; font-weight:700;
    background:var(--red); color:#fff; border:0; border-radius:8px; cursor:pointer;
    transition: background .15s, transform .05s;
  }
  .btn-primary:hover { background:var(--red-dark); }
  .btn-primary:active { transform:translateY(1px); }
  .btn-primary[disabled] { opacity:.6; cursor:not-allowed; }
  .err {
    background:#fef2f2; color:#991b1b; border:1px solid #fecaca;
    border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:14px;
  }
  .hidden { display:none !important; }

  /* ── Dashboard ────────────────────────────────────────── */
  .toolbar {
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:18px; flex-wrap:wrap;
  }
  .toolbar-title { font-size:20px; font-weight:700; margin:0; }
  .toolbar-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .btn-ghost {
    background:#fff; border:1px solid var(--line); color:var(--text);
    padding:7px 12px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .btn-ghost:hover { border-color:var(--red); color:var(--red); }
  .auto-refresh-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; border-radius:999px;
    background:var(--soft); color:var(--muted); font-size:12px; font-weight:600;
  }

  /* Stat cards */
  .stats-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap:12px; margin-bottom:22px;
  }
  .stat-card {
    background:var(--card); border:1px solid var(--line);
    border-radius:10px; padding:14px 16px;
  }
  .stat-label { color:var(--muted); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  .stat-value { font-size:24px; font-weight:800; margin-top:4px; line-height:1.1; }
  .stat-sub { color:var(--muted); font-size:11px; margin-top:2px; }
  .stat-card.accent-red    { border-top:3px solid var(--red); }
  .stat-card.accent-ok     { border-top:3px solid var(--ok); }
  .stat-card.accent-warn   { border-top:3px solid var(--warn); }
  .stat-card.accent-err    { border-top:3px solid var(--err); }
  .stat-card.accent-info   { border-top:3px solid var(--info); }

  /* By-status / by-tool side-by-side */
  .panels-row {
    display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-bottom:22px;
  }
  @media (max-width:760px) { .panels-row { grid-template-columns: 1fr; } }
  .panel {
    background:var(--card); border:1px solid var(--line);
    border-radius:10px; padding:14px 16px;
  }
  .panel-title { font-size:13px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:0 0 10px; }
  .kv-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 0; border-bottom:1px dashed #f1f5f9;
  }
  .kv-row:last-child { border-bottom:0; }
  .kv-key { font-weight:600; }
  .kv-val { color:var(--muted); font-variant-numeric:tabular-nums; font-weight:700; }
  .kv-empty { color:var(--muted); font-size:13px; padding:6px 0; }

  /* Jobs table */
  .table-card {
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    overflow:hidden;
  }
  .table-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid var(--line);
    flex-wrap:wrap; gap:8px;
  }
  .table-head h3 { margin:0; font-size:14px; font-weight:700; }
  .filter-row { display:flex; gap:6px; flex-wrap:wrap; }
  .filter-pill {
    padding:4px 10px; font-size:12px; font-weight:600; cursor:pointer;
    background:var(--soft); color:var(--muted); border:1px solid transparent; border-radius:999px;
  }
  .filter-pill.is-active { background:#fff; color:var(--red); border-color:var(--red); }
  .filter-pill:hover { color:var(--red); }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; min-width:700px; }
  thead th {
    text-align:left; font-size:11px; font-weight:700;
    color:var(--muted); text-transform:uppercase; letter-spacing:.05em;
    padding:10px 14px; background:#fafafa; border-bottom:1px solid var(--line);
  }
  tbody td {
    padding:10px 14px; border-bottom:1px solid #f3f4f6; font-size:13px;
    vertical-align:middle;
  }
  tbody tr:last-child td { border-bottom:0; }
  tbody tr:hover { background:#fafafa; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:12px; }
  .id-pill { background:var(--soft); padding:2px 8px; border-radius:4px; }
  .age { color:var(--muted); }
  .filename { max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:inline-block; vertical-align:middle; }

  .badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700;
    text-transform:capitalize;
  }
  .badge .dot { width:6px; height:6px; border-radius:50%; }
  .badge.b-pending    { background:#eff6ff; color:#1d4ed8; }   .badge.b-pending .dot    { background:#3b82f6; }
  .badge.b-processing { background:#fefce8; color:#a16207; }   .badge.b-processing .dot { background:#eab308; animation:pulse 1.4s infinite; }
  .badge.b-done       { background:#ecfdf5; color:#047857; }   .badge.b-done .dot       { background:#10b981; }
  .badge.b-failed     { background:#fef2f2; color:#b91c1c; }   .badge.b-failed .dot     { background:#ef4444; }
  .badge.b-unknown    { background:#f1f5f9; color:#475569; }   .badge.b-unknown .dot    { background:#94a3b8; }

  .empty {
    padding:36px 16px; text-align:center; color:var(--muted); font-size:14px;
  }
  .err-cell { color:var(--err); font-size:12px; max-width:200px; display:inline-block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Mobile compaction */
  @media (max-width:560px) {
    main { padding:16px 12px 40px; }
    header { padding:12px 14px; }
    .stat-value { font-size:20px; }
    .toolbar-title { font-size:18px; }
  }
</style>
</head>
<body>

<!-- ── Login view ──────────────────────────────────────────── -->
<section id="login-view" class="login-shell">
  <form id="login-form" class="login-card" autocomplete="off">
    <div class="brand"><span class="brand-dot">I</span> ILovePDF&nbsp;<span style="color:var(--muted);font-weight:500">Admin</span></div>
    <h1 class="login-title" style="margin-top:14px">Queue Dashboard</h1>
    <p class="login-sub">Enter the admin password to view live KV stats and recent jobs.</p>
    <div id="login-err" class="err hidden"></div>
    <input type="text" name="username" value="admin" autocomplete="username" aria-hidden="true" tabindex="-1" style="position:absolute;left:-9999px;height:0;width:0;opacity:0" />
    <div class="field">
      <label for="login-pw">Password</label>
      <input id="login-pw" type="password" autocomplete="current-password" required autofocus />
    </div>
    <button id="login-btn" class="btn-primary" type="submit">Sign in</button>
  </form>
</section>

<!-- ── Dashboard view ──────────────────────────────────────── -->
<div id="dash-view" class="hidden">
  <header>
    <div class="brand"><span class="brand-dot">I</span> ILovePDF&nbsp;<span style="color:var(--muted);font-weight:500">Admin</span></div>
    <div class="header-spacer"></div>
    <div class="header-meta">
      <span><span class="pulse"></span> live</span>
      <span id="last-refresh">—</span>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <h1 class="toolbar-title">Queue Dashboard</h1>
      <div class="toolbar-actions">
        <span class="auto-refresh-pill" id="auto-refresh-pill">Auto-refresh 15s</span>
        <button class="btn-ghost" id="refresh-btn">Refresh now</button>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      <!-- populated dynamically -->
    </div>

    <div class="panels-row">
      <div class="panel">
        <h2 class="panel-title">By status</h2>
        <div id="by-status"><div class="kv-empty">Loading…</div></div>
      </div>
      <div class="panel">
        <h2 class="panel-title">By tool</h2>
        <div id="by-tool"><div class="kv-empty">Loading…</div></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-head">
        <h3>Recent jobs</h3>
        <div class="filter-row" id="filter-row">
          <span class="filter-pill is-active" data-status="">All</span>
          <span class="filter-pill" data-status="pending">Pending</span>
          <span class="filter-pill" data-status="processing">Processing</span>
          <span class="filter-pill" data-status="done">Done</span>
          <span class="filter-pill" data-status="failed">Failed</span>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Job</th><th>Tool</th><th>File</th><th>Size</th><th>Status</th><th>Age</th>
            </tr>
          </thead>
          <tbody id="jobs-tbody">
            <tr><td colspan="6" class="empty">Loading jobs…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="/js/config.js"></script>
<script>
(() => {
  const TOKEN_KEY = 'ilovepdf:admin:token';
  const REFRESH_MS = 15000;

  const $ = (id) => document.getElementById(id);
  const loginView = $('login-view');
  const dashView  = $('dash-view');
  const loginForm = $('login-form');
  const loginErr  = $('login-err');
  const loginBtn  = $('login-btn');
  const loginPw   = $('login-pw');
  const refreshBtn= $('refresh-btn');
  const logoutBtn = $('logout-btn');
  const lastRefreshEl = $('last-refresh');

  let activeFilter = '';
  let refreshTimer = null;

  function getToken() {
    try { return localStorage.getItem(TOKEN_KEY) || ''; } catch { return ''; }
  }
  function setToken(t) {
    try { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); } catch {}
  }
  function showLogin() {
    loginView.classList.remove('hidden');
    dashView.classList.add('hidden');
    setTimeout(() => loginPw.focus(), 80);
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  }
  function showDash() {
    loginView.classList.add('hidden');
    dashView.classList.remove('hidden');
    refreshAll();
    if (!refreshTimer) refreshTimer = setInterval(refreshAll, REFRESH_MS);
  }

  function adminUrl(path) {
    const base = (window.QUEUE_API_BASE || '').replace(/\/+$/, '');
    return base + path;
  }
  async function adminFetch(path, opts) {
    const o = opts || {};
    o.headers = Object.assign({}, o.headers || {}, {
      'authorization': 'Bearer ' + getToken(),
    });
    const res = await fetch(adminUrl(path), o);
    if (res.status === 401 || res.status === 403) {
      setToken('');
      showLogin();
      throw new Error('session expired — sign in again');
    }
    return res;
  }

  // ── Login ────────────────────────────────────────────────
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginErr.classList.add('hidden');
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';
    try {
      const res = await fetch(adminUrl('/api/admin/login'), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ password: loginPw.value }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'login failed');
      setToken(data.token);
      loginPw.value = '';
      showDash();
    } catch (err) {
      loginErr.textContent = err.message || 'Login failed';
      loginErr.classList.remove('hidden');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
    }
  });

  logoutBtn.addEventListener('click', () => { setToken(''); showLogin(); });
  refreshBtn.addEventListener('click', () => refreshAll());

  document.getElementById('filter-row').addEventListener('click', (e) => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    activeFilter = pill.dataset.status || '';
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.toggle('is-active', p === pill));
    refreshJobs();
  });

  // ── Renderers ────────────────────────────────────────────
  function fmtBytes(n) {
    n = Number(n) || 0;
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
    return (n / 1024 / 1024 / 1024).toFixed(2) + ' GB';
  }
  function fmtAge(ts) {
    if (!ts) return '—';
    const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
    if (s < 60)    return s + 's ago';
    if (s < 3600)  return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function statusBadge(s) {
    const cls = ['pending','processing','done','failed'].includes(s) ? s : 'unknown';
    return `<span class="badge b-${cls}"><span class="dot"></span>${escapeHtml(s || 'unknown')}</span>`;
  }

  function renderStats(s) {
    const t = s.totals || {};
    const cards = [
      { k:'Jobs indexed', v: t.jobs_indexed || 0,  sub:'within KV TTL', cls:'accent-info' },
      { k:'Last 24 h',    v: t.last_24h    || 0,  sub: fmtBytes(t.bytes_24h) + ' processed', cls:'accent-red' },
      { k:'Last 1 h',     v: t.last_1h     || 0,  sub:'in the past hour', cls:'accent-warn' },
      { k:'In progress',  v: (s.by_status && (s.by_status.processing || 0)) , sub:'currently being worked', cls:'accent-warn' },
      { k:'Completed',    v: (s.by_status && (s.by_status.done || 0)),       sub:'success', cls:'accent-ok' },
      { k:'Failed',       v: (s.by_status && (s.by_status.failed || 0)),     sub:'after retries exhausted', cls:'accent-err' },
    ];
    $('stats-grid').innerHTML = cards.map(c => `
      <div class="stat-card ${c.cls}">
        <div class="stat-label">${escapeHtml(c.k)}</div>
        <div class="stat-value">${escapeHtml(c.v)}</div>
        <div class="stat-sub">${escapeHtml(c.sub)}</div>
      </div>
    `).join('');

    const byStatus = s.by_status || {};
    const byStatusKeys = Object.keys(byStatus).sort((a,b) => byStatus[b]-byStatus[a]);
    $('by-status').innerHTML = byStatusKeys.length
      ? byStatusKeys.map(k => `
          <div class="kv-row">
            <span class="kv-key">${statusBadge(k)}</span>
            <span class="kv-val">${byStatus[k]}</span>
          </div>`).join('')
      : '<div class="kv-empty">No jobs yet.</div>';

    const byTool = s.by_tool || {};
    const byToolKeys = Object.keys(byTool).sort((a,b) => byTool[b]-byTool[a]).slice(0, 12);
    $('by-tool').innerHTML = byToolKeys.length
      ? byToolKeys.map(k => `
          <div class="kv-row">
            <span class="kv-key">${escapeHtml(k)}</span>
            <span class="kv-val">${byTool[k]}</span>
          </div>`).join('')
      : '<div class="kv-empty">No tool activity recorded.</div>';
  }

  function renderJobs(jobs) {
    const tbody = $('jobs-tbody');
    if (!jobs || jobs.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">No jobs match this filter.</td></tr>`;
      return;
    }
    tbody.innerHTML = jobs.map(j => `
      <tr>
        <td><span class="mono id-pill" title="${escapeHtml(j.id)}">${escapeHtml(j.id.slice(0,8))}</span></td>
        <td>${escapeHtml(j.tool || '—')}</td>
        <td>
          <span class="filename" title="${escapeHtml(j.file_name || j.name || '')}">${escapeHtml(j.file_name || j.name || '—')}</span>
          ${j.error ? `<br><span class="err-cell" title="${escapeHtml(j.error)}">${escapeHtml(j.error)}</span>` : ''}
        </td>
        <td class="mono">${fmtBytes(j.size)}</td>
        <td>${statusBadge(j.status)}${(j.attempts > 1) ? ` <span class="age">×${j.attempts}</span>` : ''}</td>
        <td class="age" title="${new Date(j.cts || j.ts).toLocaleString()}">${fmtAge(j.cts || j.ts)}</td>
      </tr>
    `).join('');
  }

  // ── Refresh ──────────────────────────────────────────────
  async function refreshStats() {
    try {
      const res = await adminFetch('/api/admin/stats');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'stats failed');
      renderStats(data);
    } catch (err) {
      console.error('[stats]', err);
    }
  }
  async function refreshJobs() {
    try {
      const url = '/api/admin/jobs?limit=20' + (activeFilter ? '&status=' + encodeURIComponent(activeFilter) : '');
      const res = await adminFetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'jobs failed');
      renderJobs(data.jobs || []);
    } catch (err) {
      console.error('[jobs]', err);
      $('jobs-tbody').innerHTML = `<tr><td colspan="6" class="empty">Couldn't load jobs — ${escapeHtml(err.message)}</td></tr>`;
    }
  }
  async function refreshAll() {
    await Promise.all([refreshStats(), refreshJobs()]);
    lastRefreshEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
  }

  // ── Boot ─────────────────────────────────────────────────
  if (getToken()) showDash(); else showLogin();
})();
</script>
</body>
</html>
